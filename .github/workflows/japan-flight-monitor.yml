name: Japan Flight Monitor

on:
  workflow_dispatch:
  schedule:
    # GitHub Actions cron is best-effort and 5 minutes is the fastest supported cadence.
    - cron: '*/5 * * * *'

permissions:
  contents: read

concurrency:
  group: japan-flight-monitor
  cancel-in-progress: true

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      PYTHONIOENCODING: utf-8
      GITHUB_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      GMAIL_SMTP_USERNAME: benjcabrera7@gmail.com
      NOTIFY_EMAIL_TO: benjcabrera7@gmail.com
      GMAIL_SMTP_APP_PASSWORD: ${{ secrets.GMAIL_SMTP_APP_PASSWORD }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Restore notification state
        id: restore-alert-state
        uses: actions/cache/restore@v4
        with:
          path: .monitor-state
          key: ${{ runner.os }}-japan-flight-monitor-state-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-japan-flight-monitor-state-${{ github.ref_name }}-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-chromium-v1

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright requests PyNaCl

      - name: Install Chromium
        run: python -m playwright install chromium

      - name: Run flight monitor
        run: |
          python japan_flight_monitor.py --top 20 --json-output flight-monitor-report.json | tee flight-monitor-output.txt

      - name: Send notifications for new matches
        run: |
          python send_flight_notifications.py \
            --report flight-monitor-report.json \
            --state-file .monitor-state/last_notification_hash.txt

      - name: Publish workflow summary
        shell: bash
        run: |
          {
            echo "## Japan flight monitor"
            echo
            echo '```text'
            cat flight-monitor-output.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload scan output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: japan-flight-monitor-${{ github.run_number }}
          path: |
            flight-monitor-output.txt
            flight-monitor-report.json

      - name: Save notification state
        if: always() && hashFiles('.monitor-state/last_notification_hash.txt') != ''
        uses: actions/cache/save@v4
        with:
          path: .monitor-state
          key: ${{ runner.os }}-japan-flight-monitor-state-${{ github.ref_name }}-${{ github.run_id }}