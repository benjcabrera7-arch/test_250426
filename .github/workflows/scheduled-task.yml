name: Scheduled Task

on:
  workflow_dispatch:
  schedule:
    # 30-minute cadence keeps alerts useful without unnecessary drift, spam, or quota pressure.
    - cron: '*/30 * * * *'

permissions:
  contents: read

concurrency:
  group: scheduled-task
  cancel-in-progress: true

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      PYTHONIOENCODING: utf-8
      GITHUB_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      QUERY_INPUTS_A: ${{ secrets.QUERY_INPUTS_A }}
      QUERY_INPUTS_B: ${{ secrets.QUERY_INPUTS_B }}
      FILTER_TOKENS: ${{ secrets.FILTER_TOKENS }}
      MIN_THRESHOLD: ${{ secrets.MIN_THRESHOLD }}
      MAX_THRESHOLD: ${{ secrets.MAX_THRESHOLD }}
      LANGUAGE_CODE: ${{ secrets.LANGUAGE_CODE }}
      MARKET_CODE: ${{ secrets.MARKET_CODE }}
      LOCALE_CODE: ${{ secrets.LOCALE_CODE }}
      TIMEZONE_NAME: ${{ secrets.TIMEZONE_NAME }}
      VALUE_LABEL: ${{ secrets.VALUE_LABEL }}
      INPUT_VALUE_TOKEN: ${{ secrets.INPUT_VALUE_TOKEN }}
      SOURCE_BASE_URL: ${{ secrets.SOURCE_BASE_URL }}
      SOURCE_PATH_TEMPLATE: ${{ secrets.SOURCE_PATH_TEMPLATE }}
      SUMMARY_SECTION_HEADER: ${{ secrets.SUMMARY_SECTION_HEADER }}
      PRIMARY_MATCH_LABEL: ${{ secrets.PRIMARY_MATCH_LABEL }}
      SUMMARY_LABELS: ${{ secrets.SUMMARY_LABELS }}
      SECTION_BREAK_PREFIXES: ${{ secrets.SECTION_BREAK_PREFIXES }}
      SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
      NOTIFY_TO: ${{ secrets.NOTIFY_TO }}
      MESSAGE_TOKEN: ${{ secrets.MESSAGE_TOKEN }}
      MESSAGE_TARGET: ${{ secrets.MESSAGE_TARGET }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Restore state
        id: restore-alert-state
        uses: actions/cache/restore@v4
        with:
          path: .task-state
          key: ${{ runner.os }}-scheduled-task-state-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-scheduled-task-state-${{ github.ref_name }}-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache runtime browser
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-chromium-v1

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install browser runtime
        run: python -m playwright install chromium

      - name: Run monitor
        run: |
          python monitor.py --top 20 --json-output task-report.json | tee task-output.txt

      - name: Send notifications for new matches
        run: |
          python notifier.py \
            --report task-report.json \
            --state-file .task-state/last_notification_hash.txt

      - name: Publish workflow summary
        shell: bash
        run: |
          {
            echo "## Scheduled task"
            echo
            echo '```text'
            cat task-output.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload scan output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scheduled-task-${{ github.run_number }}
          path: |
            task-output.txt
            task-report.json

      - name: Save state
        if: always() && hashFiles('.task-state/last_notification_hash.txt') != ''
        uses: actions/cache/save@v4
        with:
          path: .task-state
          key: ${{ runner.os }}-scheduled-task-state-${{ github.ref_name }}-${{ github.run_id }}